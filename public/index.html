<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>DevPilot AI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* gradient floating background */
.bg-glow{
position:absolute;
filter:blur(120px);
opacity:.25;
z-index:-1;
pointer-events:none;
}
/* smooth button glow */
.glow-btn{
transition:all .3s ease;
}

.glow-btn:hover{
box-shadow:0 0 18px #00eaff;
transform:translateY(-1px);
}
/* Hide scrollbar but allow scrolling */
.hide-scrollbar::-webkit-scrollbar {
display: none;
}

.hide-scrollbar {
-ms-overflow-style: none;
scrollbar-width: none;
}
</style>

</head>

   <body class="bg-[#0B0F19] text-white h-screen flex overflow-hidden relative">

<!-- background glow -->
<div class="bg-glow w-96 h-96 bg-cyan-500 top-10 left-10"></div>
<div class="bg-glow w-96 h-96 bg-purple-500 bottom-10 right-10"></div>


<!-- SIDEBAR -->

<div class="w-64 bg-white/5 backdrop-blur-xl border-r border-white/10 p-6 flex flex-col justify-between">

<div>

<h1 class="text-2xl font-bold text-cyan-400 mb-8">
DevPilot AI
</h1>

<nav class="space-y-4">

<button onclick="setMode('review')" class="navBtn">
Code Reviewer
</button>

<button onclick="setMode('bug')" class="navBtn">
Bug Fix Assistant
</button>

<button onclick="setMode('crud')" class="navBtn">
CRUD Generator
</button>

</nav>

</div>

<div class="text-xs text-gray-500">
Hackathon Build v1.0
</div>

</div>


<!-- MAIN PANEL -->

<div class="flex-1 p-10">

<!-- header -->

<div class="flex justify-between items-center mb-8">

<h2 id="modeTitle" class="text-3xl font-semibold">
Code Reviewer
</h2>

<div class="flex items-center gap-2 text-green-400">

<span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
AI Connected

</div>

</div>


<!-- INPUT PANEL -->

<textarea
id="inputBox"
placeholder="Paste your code / error / schema here..."
class="w-full h-52 bg-[#121826] border border-white/10 rounded-2xl p-5 outline-none focus:ring-2 focus:ring-cyan-400 resize-none transition"
></textarea>


<!-- BUTTONS -->

<div class="flex gap-4 mt-4">

<button
onclick="sendPrompt()"
class="glow-btn px-6 py-2 rounded-xl bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-600"
>
Analyze with AI
</button>

<button
id="clearBtn"
onclick="clearInput()"
class="px-6 py-2 rounded-xl border border-white/20 hover:bg-white/10 transition"
>
🧹 Clear
</button>


<button
id="copyBtn"
onclick="copyOutput()"
class="px-6 py-2 rounded-xl border border-white/20 hover:bg-white/10 transition"
>
📋 Copy Output
</button>

</div>


<!-- OUTPUT PANEL -->

<div
id="outputBox"
class="mt-8 bg-[#121826] border border-white/10 rounded-2xl p-6 min-h-[220px] max-h-[60vh] overflow-y-auto leading-relaxed text-gray-200 shadow-lg transition-all duration-300"
>
<span class="text-gray-500">AI response will appear here...</span>
</div>

</div>


<script src="script.js"></script>

</body>
</html>
