<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DevPilot AI</title>

        <script src="https://cdn.tailwindcss.com"></script>

<style>

/* ===== GLOBAL DARK THEME ===== */

body{
background:
radial-gradient(circle at 20% 30%, rgba(0,255,255,.08), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(139,92,246,.08), transparent 40%),
#070b14;
font-family: 'Inter', sans-serif;
letter-spacing:.2px;
}

/* ===== FLOATING GRADIENT BLOBS ===== */

.bg-blur{
position:absolute;
filter:blur(140px);
opacity:.45;
z-index:0;
animation:float 12s ease-in-out infinite alternate;
}

@keyframes float{
0%{transform:translateY(0px) scale(1)}
100%{transform:translateY(-60px) scale(1.08)}
}


/* ===== SIDEBAR GLASS EFFECT ===== */

.w-64{
background:linear-gradient(
180deg,
rgba(255,255,255,.06),
rgba(255,255,255,.02)
);
backdrop-filter:blur(22px);
box-shadow:
0 0 25px rgba(0,255,255,.08),
inset 0 0 15px rgba(255,255,255,.04);
}


/* ===== NAV BUTTONS ===== */

.nav-item{
transition:all .25s ease;
position:relative;
}

.nav-item:hover{
background:rgba(0,255,255,.08);
transform:translateX(6px);
box-shadow:0 0 12px rgba(0,255,255,.2);
}

.nav-item::before{
content:"";
position:absolute;
left:-10px;
top:50%;
transform:translateY(-50%);
width:4px;
height:0%;
background:linear-gradient(to bottom,#22d3ee,#8b5cf6);
transition:.25s ease;
border-radius:5px;
}

.nav-item:hover::before{
height:70%;
}


/* ===== TOPBAR GLASS ===== */

.border-b{
background:linear-gradient(
to right,
rgba(255,255,255,.04),
rgba(255,255,255,.02)
);
backdrop-filter:blur(18px);
}


/* ===== INPUT PANEL ===== */

textarea{
background:linear-gradient(
145deg,
#0f1628,
#0a0f1d
);
box-shadow:
inset 0 0 12px rgba(0,255,255,.08),
0 0 8px rgba(139,92,246,.08);
transition:.3s ease;
}

textarea:focus{
box-shadow:
0 0 18px rgba(0,255,255,.25),
inset 0 0 12px rgba(0,255,255,.15);
transform:scale(1.01);
}


/* ===== OUTPUT PANEL ===== */

#outputBox{
background:linear-gradient(
145deg,
#0f1628,
#0a0f1d
);
box-shadow:
0 0 20px rgba(139,92,246,.12),
inset 0 0 12px rgba(0,255,255,.05);
transition:.3s ease;
}

#outputBox:hover{
box-shadow:
0 0 30px rgba(139,92,246,.25);
}


/* ===== BUTTON GLOW ===== */

.glow-btn{
animation:glow 2.2s infinite alternate;
border:none;
font-weight:600;
letter-spacing:.4px;
}

@keyframes glow{
from{
box-shadow:
0 0 10px #22d3ee,
0 0 20px rgba(34,211,238,.3);
}
to{
box-shadow:
0 0 22px #8b5cf6,
0 0 40px rgba(139,92,246,.35);
}
}

.glow-btn:hover{
transform:scale(1.07);
}


/* ===== SECONDARY BUTTONS ===== */

button.border{
background:rgba(255,255,255,.03);
backdrop-filter:blur(12px);
}

button.border:hover{
background:rgba(255,255,255,.08);
box-shadow:0 0 12px rgba(0,255,255,.18);
}


/* ===== STATUS DOT ===== */

.animate-pulse{
box-shadow:0 0 8px #22c55e;
}


/* ===== SCROLLBAR STYLING ===== */

::-webkit-scrollbar{
width:8px;
}

::-webkit-scrollbar-track{
background:#0b0f19;
}

::-webkit-scrollbar-thumb{
background:linear-gradient(#22d3ee,#8b5cf6);
border-radius:10px;
}


/* ===== TEXT ENHANCEMENT ===== */

h1,h2,h3{
letter-spacing:.5px;
text-shadow:0 0 6px rgba(0,255,255,.25);
}


/* ===== DASHBOARD DEPTH EFFECT ===== */

.flex-1{
background:
linear-gradient(
to bottom right,
rgba(255,255,255,.02),
rgba(255,255,255,.01)
);
backdrop-filter:blur(10px);
}

</style>

    </head>

    <body class="bg-[#0B0F19] text-white min-h-screen flex">

        <!-- floating gradients -->
        <div class="bg-blur w-96 h-96 bg-cyan-500 top-20 left-20"></div>
        <div class="bg-blur w-96 h-96 bg-purple-500 bottom-20 right-20"></div>

        <!-- SIDEBAR -->
        <div
            class="relative z-10 w-64 backdrop-blur-xl bg-white/5 border-r border-white/10 p-6 flex flex-col justify-between">

            <div>

                <h1 class="text-2xl font-bold text-cyan-400 mb-10">
                    DevPilot AI
                </h1>

                <nav class="space-y-4">

                    <button onclick="setMode('review')"
                        class="nav-item w-full text-left px-4 py-2 rounded-xl hover:bg-cyan-500/20 transition">
                        Code Reviewer
                    </button>

                    <button onclick="setMode('bug')"
                        class="nav-item w-full text-left px-4 py-2 rounded-xl hover:bg-cyan-500/20 transition">
                        Bug Fix Assistant
                    </button>

                    <button onclick="setMode('crud')"
                        class="nav-item w-full text-left px-4 py-2 rounded-xl hover:bg-cyan-500/20 transition">
                        CRUD API Generator
                    </button>

                </nav>

            </div>

            <div class="text-xs text-gray-400">
                v1.0 Hackathon Build
            </div>

        </div>

        <!-- MAIN CONTENT -->
        <div class="relative z-10 flex-1 flex flex-col">

            <!-- TOPBAR -->
            <div
                class="flex justify-between items-center px-10 py-5 border-b border-white/10 backdrop-blur-xl bg-white/5">

                <div class="flex items-center gap-4">

                    <h2 class="text-xl font-semibold">
                        DevPilot AI Dashboard
                    </h2>

                    <div class="flex items-center gap-2 text-green-400">

                        <span
                            class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                        AI Connected

                    </div>

                </div>

                <div
                    class="w-9 h-9 bg-gradient-to-r from-cyan-500 to-purple-500 rounded-full"></div>

            </div>

            <!-- MAIN PANEL -->
            <div class="p-10 space-y-6">

                <h3 id="modeTitle" class="text-2xl font-semibold">
                    Code Reviewer
                </h3>

                <!-- INPUT PANEL -->
                <textarea
                    id="inputBox"
                    placeholder="Paste your code or error here..."
                    class="w-full h-48 p-5 bg-[#121826] border border-white/10 rounded-2xl focus:ring-2 focus:ring-cyan-400 outline-none transition resize-none font-mono"></textarea>

                <!-- ACTION BUTTONS -->
                <div class="flex gap-4">

                    <button onclick="sendPrompt()"
                        class="glow-btn px-6 py-2 rounded-xl bg-gradient-to-r from-cyan-500 via-blue-500 to-purple-600 hover:scale-105 transition">
                        Analyze with AI
                    </button>

                    <button
                        id="clearBtn"
                        onclick="clearInput()"
                        class="px-6 py-2 rounded-xl border border-white/20 hover:bg-white/10 transition flex items-center gap-2">
                        🧹 Clear
                    </button>

                    <button
                        id="copyBtn"
                        onclick="copyOutput()"
                        class="px-6 py-2 rounded-xl border border-white/20 hover:bg-white/10 transition flex items-center gap-2">
                        📋 Copy Output
                    </button>

                </div>

                <!-- OUTPUT PANEL -->
                <div
                    id="outputBox"
                    class="mt-6 bg-[#121826] border border-white/10 rounded-2xl p-6 min-h-[200px] max-h-[400px] overflow-y-auto leading-relaxed text-gray-200 shadow-lg transition-all duration-300">

                    <span class="text-gray-500">AI response will appear
                        here...</span>
                </div>

            </div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
